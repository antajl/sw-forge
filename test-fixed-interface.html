<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixed Interface Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
    .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
    .pass { color: green; }
    .fail { color: red; }
    .interface-preview { background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 10px 0; }
    .role-nav { background: #e0e0e0; padding: 10px; border-radius: 5px; margin-bottom: 10px; width: 200px; }
    .role-nav-item { padding: 5px; margin: 2px 0; background: #fff; border-radius: 3px; cursor: pointer; }
    .role-nav-item.active { background: #007bff; color: white; }
    .role-content { background: #f0f0f0; padding: 15px; border-radius: 5px; min-height: 200px; }
    .duplicate-warning { background: #fff3cd; border: 1px solid #ffeaa7; color: #856404; padding: 10px; border-radius: 5px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>Fixed Interface Test</h1>
  
  <div class="test-section">
    <h2>Interface Structure Test</h2>
    <div id="interface-test-result"></div>
  </div>
  
  <div class="test-section">
    <h2>Expected Interface Structure</h2>
    <div class="interface-preview">
      <div style="display: grid; grid-template-columns: 200px 1fr; gap: 15px;">
        <div>
          <div class="role-nav">
            <div style="font-weight: bold; margin-bottom: 8px;">Roles</div>
            <div class="role-nav-item active">Classic DPS</div>
            <div class="role-nav-item">Slow DPS</div>
            <div class="role-nav-item">Bomber</div>
            <div class="role-nav-item">Fast Utility</div>
            <div class="role-nav-item">Heavy Resist</div>
            <div class="role-nav-item">Bruiser</div>
          </div>
        </div>
        <div>
          <div style="margin-bottom: 10px;">
            <label>Select Role: </label>
            <select style="margin-right: 10px; padding: 5px;">
              <option>Choose a role...</option>
              <option>Classic DPS</option>
              <option>Slow DPS</option>
              <option>Bomber</option>
              <option>Fast Utility</option>
              <option>Heavy Resist</option>
              <option>Bruiser</option>
            </select>
            <input type="text" placeholder="e.g. Control SPD" style="margin-right: 10px; padding: 5px;" />
            <button>+ Add role</button>
          </div>
          <div class="role-content">
            <h3>Classic DPS</h3>
            <div style="margin-bottom: 15px;">
              <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" checked style="width: 18px; height: 18px;">
                Enable Formula
              </label>
            </div>
            <div style="margin-bottom: 15px;">
              <h4>Accepted Mains</h4>
              <div style="display: grid; grid-template-columns: 80px repeat(3, 1fr); gap: 8px; font-size: 0.82rem;">
                <div style="font-weight: 600;">Slot</div><div>Main 1</div><div>Main 2</div><div>Main 3</div>
                <div style="font-weight: 600;">Slot 2</div>
                <select style="padding: 4px 8px; font-size: 0.8rem;"><option>SPD</option><option>None</option></select>
                <select style="padding: 4px 8px; font-size: 0.8rem;"><option>None</option></select>
                <select style="padding: 4px 8px; font-size: 0.8rem;"><option>None</option></select>
                <div style="font-weight: 600;">Slot 4</div>
                <select style="padding: 4px 8px; font-size: 0.8rem;"><option>CRate</option><option>CDmg</option></select>
                <select style="padding: 4px 8px; font-size: 0.8rem;"><option>None</option></select>
                <select style="padding: 4px 8px; font-size: 0.8rem;"><option>None</option></select>
                <div style="font-weight: 600;">Slot 6</div>
                <select style="padding: 4px 8px; font-size: 0.8rem;"><option>ATK%</option><option>None</option></select>
                <select style="padding: 4px 8px; font-size: 0.8rem;"><option>None</option></select>
                <select style="padding: 4px 8px; font-size: 0.8rem;"><option>None</option></select>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/settings.js"></script>
  <script src="js/advanced-formulas.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script>
    function testFixedInterface() {
      const result = document.getElementById('interface-test-result');
      let html = '';
      
      try {
        // Test if interface elements exist
        const roleNav = document.getElementById('role-nav-list');
        const roleContent = document.getElementById('roles-settings-wrap');
        const roleSelector = document.getElementById('role-selector');
        
        if (roleNav) {
          html += '<div class="result pass">✓ Role navigation list element found</div>';
          
          // Check for duplicates
          const navItems = roleNav.querySelectorAll('.role-nav-item');
          const roleNames = Array.from(navItems).map(item => item.textContent.trim());
          const uniqueRoleNames = [...new Set(roleNames)];
          
          if (roleNames.length === uniqueRoleNames.length) {
            html += '<div class="result pass">✓ No duplicate roles in navigation list</div>';
          } else {
            html += '<div class="result fail">✗ Duplicate roles found in navigation list</div>';
            html += `<div class="result fail">Total: ${roleNames.length}, Unique: ${uniqueRoleNames.length}</div>`;
            html += `<div class="result fail">Duplicates: ${roleNames.filter((name, index) => roleNames.indexOf(name) !== index).join(', ')}</div>`;
          }
        } else {
          html += '<div class="result fail">✗ Role navigation list element not found</div>';
        }
        
        if (roleContent) {
          html += '<div class="result pass">✓ Role content area found</div>';
        } else {
          html += '<div class="result fail">✗ Role content area not found</div>';
        }
        
        if (roleSelector) {
          html += '<div class="result pass">✓ Role selector dropdown found</div>';
        } else {
          html += '<div class="result fail">✗ Role selector dropdown not found</div>';
        }
        
        // Test SWRM settings
        if (window.SWRM && window.SWRM.settings) {
          html += '<div class="result pass">✓ SWRM settings available</div>';
          
          if (window.SWRM.settings.formulas) {
            const formulaCount = Object.keys(window.SWRM.settings.formulas).length;
            html += `<div class="result pass">✓ ${formulaCount} formulas available</div>`;
          } else {
            html += '<div class="result fail">✗ Formulas not found in settings</div>';
          }
        } else {
          html += '<div class="result fail">✗ SWRM settings not available</div>';
        }
        
        // Test if renderRoleSettings function exists
        if (typeof window.renderRoleSettings === 'function') {
          html += '<div class="result pass">✓ renderRoleSettings function exists</div>';
        } else {
          html += '<div class="result fail">✗ renderRoleSettings function not found</div>';
        }
        
      } catch (error) {
        html += `<div class="result fail">✗ Error: ${error.message}</div>`;
      }
      
      result.innerHTML = html;
    }
    
    // Run test when page loads
    window.addEventListener('load', testFixedInterface);
  </script>
</body>
</html>
